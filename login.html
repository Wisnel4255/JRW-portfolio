<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | JRW Portfolio</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

    <div class="login-left">

        <h1>JRW</h1>

        <h2>Bon retour !</h2>

        <p>
            Connectez-vous pour accéder à votre espace personnel
            et découvrir mes projets.
        </p>

        <img src="jrw.jpeg" alt="Jean René Wisnel">

    </div>

    <div class="login-right">

        <h2>Connexion</h2>

        <form>

            <input type="email"
            placeholder="Adresse e-mail"
            required>

            <input type="password"
            placeholder="Mot de passe"
            required>

            <div class="remember-me">

                <label>
                    <input class="chekbox1" type="checkbox">
                    Se souvenir de moi
                </label>

                <a href="#">Mot de passe oublié ?</a>

            </div>

            <button type="submit">
                Se connecter
            </button>

        </form>

        <div class="separator">
            <span>OU</span>
        </div>

        <button class="google-btn">
            Continuer avec Google
        </button>

        <p class="signup-text">

            Vous n'avez pas de compte ?

            <a href="signup.html">
                Créer un compte
            </a>

        </p>

        <a href="index.html" class="back-home">
            ← Retour à l'accueil
        </a>

    </div>

</div>

</body>
</html>
